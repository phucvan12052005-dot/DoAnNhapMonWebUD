<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNAT - Cửa hàng điện tử chính hãng</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-inner">
            <div class="topbar-left">
                <span><i class="fas fa-phone"></i>1800-1234 (Miễn phí)</span>
                <span><i class="fas fa-map-marker-alt"></i> 180 Cao lỗ, Quận 8, TP. HCM</span>
            </div>

            <div class="topbar-right">
                <a href="#"> <i class="fas fa-user"></i>Đăng nhập</a>
                <a href="#"> <i class="fas fa-user-plus"></i>Đăng ký</a>
                <a href="#"> <i class="fas fa-file-alt"></i>Tra cứu đơn hàng</a>
            </div>
        </div>
    </div>

    <!-- Header -->
     <header>
        <div class="header-inner">
            <a href="#" class="logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <span class="logo-text">TN<span>AT</span></span>
            </a>

            <div class="search-bar">
                <input type="text" placeholder="Tìm kiếm Điện thoại, Laptop, Tai nghe..." id="searchInput"/>
                <button onclick="handleSearch()"><i class="fas fa-search"></i></button>
            </div>

            <div class="header-actions">
                <a href="#" class="hdr-btn">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Cửa hàng</span>
                </a>
                <div class="hdr-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Giỏ hàng</span>
                    <div class="cart-badge" id="cartBadge">0</div>
                </div>
                <a href="#" class="hdr-btn">
                    <i class="fas fa-user"></i>
                    <span>Tài khoản</span>
                </a>
            </div>
        </div>
     </header>

     <!--NAV-->
     <nav>
        <div class="nav-inner">
            <div class="nav-item active"><i class="fas fa-mobile-alt"></i> Điện thoại</div>
            <div class="nav-item"><i class="fas fa-laptop"></i> Laptop</div>
            <div class="nav-item"><i class="fas fa-tablet-alt"></i> Máy tính bảng</div>
            <div class="nav-item"><i class="fas fa-headphones"></i> Tai nghe</div>
            <div class="nav-item"><i class="fas fa-camera"></i> Máy ảnh</div>
            <div class="nav-item"><i class="fas fa-gamepad"></i> Gaming</div>
            <div class="nav-item"><i class="fas fa-watch"></i> Đồng hồ thông minh</div>
            <div class="nav-item"><i class="fas fa-bolt" style="color: #ffe082;"></i> Flash sale</div>
        </div>
     </nav>

</body>
</html>
